services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: meeting_copilot
      POSTGRES_USER: meeting_copilot
      POSTGRES_PASSWORD: meeting_copilot
    ports:
      - "5432:5432"
    volumes:
      - meeting-copilot-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meeting_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meeting-copilot-postgres:
